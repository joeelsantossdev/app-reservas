server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/app_reservas?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect